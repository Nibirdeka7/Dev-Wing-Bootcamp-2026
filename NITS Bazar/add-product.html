<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sell Item | NITS Bazar</title>
    <link rel="stylesheet" href="css/styles.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <header class="navbar">
      <div class="container nav-container">
        <div class="logo">
          <a href="index.html">NITS<span>Bazar</span></a>
        </div>
        <nav>
          <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="add-product.html" class="sell-btn">Sell Item</a></li>
          </ul>
        </nav>
      </div>
    </header>

    <main class="container">
      <div class="form-card">
        <h2>List Your Item</h2>
        <p>Fill in the details to reach fellow students instantly.</p>

        <form id="productForm">
          <div class="input-group">
            <label for="name">Product Name</label>
            <input
              type="text"
              id="name"
              placeholder="e.g. Engineering Mathematics Vol 1"
              required
            />
          </div>

          <div class="row">
            <div class="input-group">
              <label for="price">Price (₹)</label>
              <input type="number" id="price" placeholder="500" required />
            </div>
            <div class="input-group">
              <label for="category">Category</label>
              <select id="category">
                <option value="Electronics">Electronics</option>
                <option value="Books">Books</option>
                <option value="Cycle">Cycle</option>
                <option value="Other">Other</option>
              </select>
            </div>
          </div>

          <div class="input-group">
            <label for="image">Image URL</label>
            <input
              type="url"
              id="image"
              placeholder="Paste image link here..."
              required
            />
          </div>

          <div class="input-group">
            <label for="contact">Contact Number</label>
            <input
              type="tel"
              id="contact"
              placeholder="10-digit mobile number"
              required
            />
          </div>

          <button type="submit" id="submitBtn">Post Product</button>
        </form>
      </div>
    </main>

    <script src="js/addProduct.js"></script>
  </body>
</html>
