<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NITS Bazar</title>
    <link rel="stylesheet" href="css/styles.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <header class="navbar">
      <div class="container nav-container">
        <div class="logo">
          <a href="index.html">NITS<span>Bazar</span></a>
        </div>
        <nav>
          <ul class="nav-links">
            <li><a href="index.html" class="active">Home</a></li>
            <li><a href="add-product.html" class="sell-btn">Sell Item</a></li>
          </ul>
        </nav>
      </div>
    </header>

    <main>
      <section class="hero">
        <div class="container">
          <h1>Campus Marketplace</h1>
          <p>
            The smartest way to buy and sell pre-loved items within NIT Silchar.
          </p>
        </div>
      </section>

      <section class="container">
        <div class="section-title">
          <h2>Latest Listings</h2>
          <div class="underline"></div>
        </div>
        <div id="products" class="product-grid">
          <div class="loading">Loading awesome deals...</div>
        </div>
      </section>
    </main>

    <footer>
      <div class="container footer-grid">
        <p>&copy; 2026 NITS Bazar. NIT Silchar Web Dev Bootcamp.</p>
        <p>Built with using HTML, CSS, & JS</p>
      </div>
    </footer>

    <script src="js/app.js"></script>
  </body>
</html>
